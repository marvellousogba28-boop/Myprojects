<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="" href="style.css">
    <title>sign-in-Moviebox</title>
</head>
<body>
    <div class="login-container">
        <form action="">
            <div
             class="sig-box">
        <h2>Sign up</h2>

        <div class="input-box">
        <label for="Fullname"></label>
        <input type="text" id="Fname" name="Fname" placeholder="Enter your full name" required size="30" style="height: 20px;">
        </div>
<br>
        <div class="input-box">
        <label for="Username"></label>
        <input type="text" id="Uname" name="Username" placeholder="Enter your username" required size="30" style="height: 20px;">
        </div>
<br>
        <div class="input-box">
        <label for="Email"></label>
        <input type="email" id="email" name="Email" placeholder="Enter Email" required size="30" style="height: 20px;">
        </div>
<br>
<div class="input-box">
        <label for="password"></label>
        <input type="password" id="password" name="password" placeholder="Input your password" required size="30" style="height: 20px;">
        </div>
         <br>
       <button type="submit">Login</button>
       <div class="registrer-link">
        <p>Already have an account? <a href="login.html"><span style="color: rgb(0, 0, 0);">login</span></a></p>
       </div>
       </div>
       </form>
    </div>
</body>
</html>
